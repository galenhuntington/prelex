name: prelex
version: 1.1.0
synopsis: Sequential numerical IDs.
author: Galen Huntington <galen@alumni.reed.edu>
license: MIT
category: Math

default-extensions:
   - NoImplicitPrelude
   - UnicodeSyntax
   - BangPatterns
   - BlockArguments
   - ConstraintKinds
   - DataKinds
   - DerivingVia
   - GeneralizedNewtypeDeriving
   - KindSignatures
   - ScopedTypeVariables
   - TypeApplications
   - TypeOperators
   # - TypeFamilies

source-dirs:
   - .

library: {}

dependencies:
   base: ">= 4.9 && < 5"
   base-prelude: ">= 1.3 && < 1.9"
   integer-logarithms: 1.0.*

